name: attendance_tracker
description: Система учета посещаемости сотрудников

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  dio: ^5.4.1
  
  # State management
  flutter_riverpod: ^2.5.1
  
  # Secure storage
  flutter_secure_storage: ^10.0.0

  # QR Scanner
  mobile_scanner: ^7.0.0
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  shimmer: ^3.0.0
  
  # Image picker (gallery / camera)
  image_picker: ^1.1.2

  # Push notifications (Firebase Cloud Messaging)
  # Требует: google-services.json (Android) и GoogleService-Info.plist (iOS)
  # из Firebase Console → Project Settings → Your apps
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  
  # Navigation
  go_router: ^13.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
