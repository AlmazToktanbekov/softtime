name: attendance_tracker
description: Система учета посещаемости сотрудников

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  dio: ^5.4.1
  
  # State management
  flutter_riverpod: ^2.5.1
  
  # Secure storage
  flutter_secure_storage: ^9.0.0
  
  # QR Scanner
  mobile_scanner: ^4.0.1
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  
  # Navigation
  go_router: ^13.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
