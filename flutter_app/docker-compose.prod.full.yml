version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: softtime_postgres_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-softtime}
      POSTGRES_USER: ${DB_USER:-softtime}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8 --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-softtime}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - softtime_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: softtime_redis_prod
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - softtime_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: softtime_backend_prod
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-softtime}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-softtime}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      # JWT
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      # App
      APP_TITLE: SoftTime
      APP_VERSION: 2.0
      ENVIRONMENT: production
      LOG_LEVEL: info
      # Admin credentials
      DEFAULT_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@softtime.local}
      DEFAULT_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      DEFAULT_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # Firebase
      FIREBASE_CREDENTIALS_PATH: /app/firebase-adminsdk.json
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # Timezone
      TZ: Asia/Bishkek
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro
      - ./backend/logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - softtime_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  admin_web:
    image: nginx:alpine
    container_name: softtime_admin_web_prod
    volumes:
      - ./admin_web:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "${ADMIN_WEB_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - softtime_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  softtime_network:
    driver: bridge
